services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      - CORS_ORIGIN=http://localhost

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:3001
    ports:
      - "80:80"
    depends_on:
      - server
